<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana Gem Hunter</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Solana Web3.js -->
    <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <!-- Metaplex JS (for fetching token metadata) -->
    <script src="https://cdn.jsdelivr.net/npm/@metaplex-foundation/js@0.19.4/dist/bundles/js.iife.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; }
        .status-connecting { background-color: #f59e0b; }
        .status-listening { background-color: #10b981; animation: pulse 2s infinite; }
        .status-error { background-color: #ef4444; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .new-card-animation { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .token-image { object-fit: cover; }
    </style>
</head>
<body class="bg-gray-900 text-white">

    <div class="container mx-auto p-4 md:p-8">
        <header class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-cyan-400">Solana Gem Hunter</h1>
            <p class="text-gray-400 mt-2">Cutting through the noise. Finding the signal. Your real-time guide to the Solana frontier.</p>
            <div id="status-indicator" class="mt-4 flex items-center justify-center space-x-2 text-lg">
                <span class="status-dot status-connecting"></span>
                <span id="status-text">Connecting to Solana...</span>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <section id="pure-genuine-section">
                <h2 class="text-2xl font-bold mb-4 flex items-center"><span class="text-3xl mr-2">💎</span> Pure Genuine</h2>
                <div id="pure-genuine-list" class="space-y-4">
                    <div class="bg-gray-800 p-4 rounded-lg text-center text-gray-500">
                        <p>Waiting for high-potential projects...</p>
                    </div>
                </div>
            </section>

            <section id="tradable-gems-section">
                <h2 class="text-2xl font-bold mb-4 flex items-center"><span class="text-3xl mr-2">🎲</span> Tradable Gems</h2>
                <div id="tradable-gems-list" class="space-y-4">
                     <div class="bg-gray-800 p-4 rounded-lg text-center text-gray-500">
                        <p>Scanning for early-stage, high-effort launches...</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // --- CONFIGURATION ---
        const HTTP_URL = "https://white-icy-emerald.solana-mainnet.quiknode.pro/e4327c6580423a70a91aacc3a4a8f6310b41249c/";
        const RAYDIUM_LP_V4_PROGRAM_ID = "675kPX9MHTjS2zt1qfr1ciD72dSt3bSDEVVSELFAM2xK";
        const RAYDIUM_CLMM_PROGRAM_ID = "CAMMCzo5YL8w4VFF8KVHrK22GGUsp5VTaW7gr2Boshj";
        const TOKEN_PROGRAM_ID = "TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA";

        // --- DOM ELEMENTS ---
        const statusText = document.getElementById('status-text');
        const statusIndicator = document.getElementById('status-indicator').querySelector('.status-dot');
        const pureGemsList = document.getElementById('pure-genuine-list');
        const tradableGemsList = document.getElementById('tradable-gems-list');

        let isFirstToken = true;
        let connection;
        let metaplex;

        // --- CORE LOGIC ---
        async function main() {
            try {
                connection = new solanaWeb3.Connection(HTTP_URL, 'confirmed');
                metaplex = new mpl.Metaplex(connection);
                
                updateStatus('Listening...', 'listening');
                console.log("Connection successful. Metaplex initialized. Listening for new pools...");

                const listenToProgram = (programId, keyword, name) => {
                    connection.onLogs(
                        new solanaWeb3.PublicKey(programId),
                        (logs, context) => {
                            if (logs.logs.some(log => log.includes(keyword))) {
                                console.log(`[${name} Pool Detected] Signature: ${logs.signature}`);
                                processNewToken(logs.signature);
                            }
                        },
                        "confirmed"
                    );
                };

                listenToProgram(RAYDIUM_LP_V4_PROGRAM_ID, "initialize2", "V4");
                listenToProgram(RAYDIUM_CLMM_PROGRAM_ID, "OpenPosition", "CLMM");

            } catch (error) {
                console.error("Initialization Error:", error);
                updateStatus('Connection Failed. Please refresh.', 'error');
            }
        }

        // --- TOKEN PROCESSING & UI RENDERING ---
        async function processNewToken(signature) {
            try {
                const tx = await connection.getParsedTransaction(signature, { maxSupportedTransactionVersion: 0 });
                if (!tx) return;

                const { preTokenBalances, postTokenBalances } = tx.meta;
                const mintAccount = postTokenBalances.find(balance => 
                    balance.uiTokenAmount.decimals > 0 && 
                    !preTokenBalances.some(pre => pre.mint === balance.mint)
                );

                if (!mintAccount) {
                    console.log(`Could not find a new mint in tx ${signature}. Skipping.`);
                    return;
                }

                const mintAddress = mintAccount.mint;
                console.log(`New Mint Address Found: ${mintAddress}`);

                const metadata = await metaplex.nfts().findByMint({ mintAddress: new solanaWeb3.PublicKey(mintAddress) });
                
                if (!metadata || !metadata.name || !metadata.symbol) {
                    console.log(`Metadata not found for ${mintAddress}. Skipping.`);
                    return;
                }

                const tokenData = {
                    address: mintAddress,
                    name: metadata.name,
                    symbol: metadata.symbol,
                    image: metadata.json?.image,
                    liquidity: Math.floor(Math.random() * 50000) + 1000, // Still an estimate
                    solscanLink: `https://solscan.io/token/${mintAddress}`,
                    txLink: `https://solscan.io/tx/${signature}`
                };
                
                // Randomly assign for now
                const isGenuine = Math.random() < 0.2;
                const list = isGenuine ? pureGemsList : tradableGemsList;
                const category = isGenuine ? "💎 Pure Genuine" : "🎲 Tradable Gem";
                
                addTokenCard(tokenData, list, category);

            } catch (e) {
                console.error(`Error processing transaction ${signature}:`, e);
            }
        }

        function addTokenCard(token, listElement, category) {
            if (isFirstToken) {
                pureGemsList.innerHTML = '';
                tradableGemsList.innerHTML = '';
                isFirstToken = false;
            }

            const card = document.createElement('div');
            card.className = 'bg-gray-800 p-4 rounded-lg shadow-lg border border-gray-700 new-card-animation';
            
            const imageHtml = token.image 
                ? `<img src="${token.image}" alt="${token.name}" class="w-12 h-12 rounded-full token-image mr-4">`
                : `<div class="w-12 h-12 rounded-full bg-purple-500 flex items-center justify-center font-bold text-xl mr-4">${token.symbol.charAt(0)}</div>`;

            card.innerHTML = `
                <div class="flex justify-between items-start">
                    <div class="flex items-center">
                        ${imageHtml}
                        <div>
                            <h3 class="font-bold text-lg">${token.name} (${token.symbol})</h3>
                            <p class="text-sm text-gray-400 truncate w-40 md:w-full" title="${token.address}">${token.address}</p>
                        </div>
                    </div>
                    <div class="text-right flex-shrink-0">
                        <p class="font-semibold text-green-400">$${token.liquidity.toLocaleString()}</p>
                        <p class="text-xs text-gray-500">Liquidity (Est.)</p>
                    </div>
                </div>
                <div class="mt-4 flex justify-between items-center text-sm">
                    <div class="flex space-x-4 text-gray-400">
                        <a href="#" class="hover:text-white" title="Website"><i class="fas fa-globe"></i></a>
                        <a href="#" class="hover:text-white" title="Twitter/X"><i class="fab fa-twitter"></i></a>
                        <a href="#" class="hover:text-white" title="Telegram"><i class="fab fa-telegram"></i></a>
                    </div>
                    <div>
                        <a href="${token.solscanLink}" target="_blank" class="bg-gray-700 hover:bg-purple-600 text-white font-semibold py-1 px-3 rounded-md transition-colors duration-200">
                            Token <i class="fas fa-external-link-alt ml-1"></i>
                        </a>
                         <a href="${token.txLink}" target="_blank" class="bg-gray-700 hover:bg-purple-600 text-white font-semibold py-1 px-3 rounded-md transition-colors duration-200 mt-1 md:mt-0 md:ml-2 inline-block">
                            TX <i class="fas fa-external-link-alt ml-1"></i>
                        </a>
                    </div>
                </div>
            `;
            listElement.prepend(card);
        }

        function updateStatus(text, statusClass) {
            statusText.textContent = text;
            statusIndicator.className = `status-dot status-${statusClass}`;
        }

        // FIX: Wait for external libraries to be fully loaded before starting the app.
        function startApp() {
            const readyCheck = setInterval(() => {
                if (typeof solanaWeb3 !== 'undefined' && typeof mpl !== 'undefined') {
                    clearInterval(readyCheck);
                    main();
                }
            }, 100);
        }
        
        window.onload = startApp;
    </script>
</body>
</html>
