<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana Gem Hunter</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Solana Web3.js library -->
    <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <style>
        /* Custom font and a subtle glow for new items */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
        .status-dot {
            height: 10px;
            width: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-connecting { background-color: #f59e0b; }
        .status-listening { background-color: #10b981; animation: pulse 2s infinite; }
        .status-error { background-color: #ef4444; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Animation for newly added cards */
        .new-card-animation {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-900 text-white">

    <div class="container mx-auto p-4 md:p-8">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-cyan-400">Solana Gem Hunter</h1>
            <p class="text-gray-400 mt-2">Cutting through the noise. Finding the signal. Your real-time guide to the Solana frontier.</p>
            <div id="status-indicator" class="mt-4 flex items-center justify-center space-x-2 text-lg">
                <span class="status-dot status-connecting"></span>
                <span id="status-text">Connecting to Solana...</span>
            </div>
        </header>

        <!-- Main Content: Two Columns -->
        <main class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- Column 1: Pure Genuine -->
            <section id="pure-genuine-section">
                <h2 class="text-2xl font-bold mb-4 flex items-center"><span class="text-3xl mr-2">💎</span> Pure Genuine</h2>
                <div id="pure-genuine-list" class="space-y-4">
                    <!-- Token cards will be inserted here by JavaScript -->
                    <div class="bg-gray-800 p-4 rounded-lg text-center text-gray-500">
                        <p>Waiting for high-potential projects...</p>
                    </div>
                </div>
            </section>

            <!-- Column 2: Tradable Gems -->
            <section id="tradable-gems-section">
                <h2 class="text-2xl font-bold mb-4 flex items-center"><span class="text-3xl mr-2">🎲</span> Tradable Gems</h2>
                <div id="tradable-gems-list" class="space-y-4">
                     <!-- Token cards will be inserted here by JavaScript -->
                     <div class="bg-gray-800 p-4 rounded-lg text-center text-gray-500">
                        <p>Scanning for early-stage, high-effort launches...</p>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <!-- The JavaScript Brain of the App -->
    <script>
        // --- CONFIGURATION ---
        const HTTP_URL = "https://white-icy-emerald.solana-mainnet.quiknode.pro/e4327c6580423a70a91aacc3a4a8f6310b41249c/";
        const RAYDIUM_LP_V4_PROGRAM_ID = "675kPX9MHTjS2zt1qfr1ciD72dSt3bSDEVVSELFAM2xK";
        const RAYDIUM_CLMM_PROGRAM_ID = "CAMMCzo5YL8w4VFF8KVHrK22GGUsp5VTaW7gr2Boshj";
        
        // --- DOM ELEMENTS ---
        const statusText = document.getElementById('status-text');
        const statusIndicator = document.getElementById('status-indicator').querySelector('.status-dot');
        const pureGemsList = document.getElementById('pure-genuine-list');
        const tradableGemsList = document.getElementById('tradable-gems-list');

        let isFirstToken = true;
        let connection; // Make connection globally accessible within the script

        // --- CORE LOGIC ---
        async function main() {
            try {
                connection = new solanaWeb3.Connection(HTTP_URL, 'confirmed');
                updateStatus('Listening...', 'listening');
                console.log("Connection successful. Listening for new pools...");

                // Listener 1: Raydium V4
                connection.onLogs(
                    new solanaWeb3.PublicKey(RAYDIUM_LP_V4_PROGRAM_ID),
                    (logs, context) => {
                        if (logs.logs.some(log => log.includes("initialize2"))) {
                            console.log(`[V4 Pool Detected] Signature: ${logs.signature}`);
                            processNewToken(logs.signature, "V4");
                        }
                    },
                    "confirmed"
                );

                // Listener 2: Raydium CLMM
                connection.onLogs(
                    new solanaWeb3.PublicKey(RAYDIUM_CLMM_PROGRAM_ID),
                    (logs, context) => {
                         if (logs.logs.some(log => log.includes("OpenPosition"))) {
                            console.log(`[CLMM Pool Detected] Signature: ${logs.signature}`);
                            processNewToken(logs.signature, "CLMM");
                        }
                    },
                    "confirmed"
                );

            } catch (error) {
                console.error("Connection Error:", error);
                updateStatus('Connection Failed. Please refresh.', 'error');
            }
        }

        // --- TOKEN PROCESSING & UI RENDERING ---

        /**
         * V1.1 - This function now fetches and analyzes the transaction.
         */
        async function processNewToken(signature, type) {
            console.log(`Analyzing transaction: ${signature}`);
            try {
                // 1. Fetch the full transaction details from the blockchain
                const tx = await connection.getParsedTransaction(signature, { maxSupportedTransactionVersion: 0 });
                if (!tx) {
                    console.log(`Failed to fetch transaction details for ${signature}. Skipping.`);
                    return;
                }

                // 2. Find the token mint address within the transaction logs
                // This is the most crucial step: extracting the actual token.
                const logMessages = tx.meta?.logMessages || [];
                let mintAddress = null;

                // Find the instruction that created the pool to identify the tokens
                // This is a simplified approach; a robust one would parse instructions more deeply.
                const accounts = tx.transaction.message.accountKeys;
                // For many standard pools, the mints are among the first few accounts listed.
                // We will look for an account that is a Token Mint. This is an approximation.
                for (const account of accounts) {
                    const address = account.pubkey.toBase58();
                    // A simple check: does this look like a new mint in this context?
                    // A real implementation would need to parse SPL Token program instructions.
                    // For this version, we'll make an educated guess based on account position.
                    // The actual token mint is often one of the first few accounts.
                     const accInfo = await connection.getParsedAccountInfo(account.pubkey);
                     if(accInfo.value?.data?.parsed?.info?.mintAuthority) {
                         // This is likely a token mint account. Let's assume it's our new token.
                         mintAddress = address;
                         console.log(`Possible Mint Address Found: ${mintAddress}`);
                         break; // Take the first one we find
                     }
                }

                if (!mintAddress) {
                    console.log(`Could not determine mint address for tx ${signature}. Skipping.`);
                    return;
                }
                
                // 3. (Future step) Get token metadata (Name, Symbol)
                // This requires another lookup, for now we use placeholder.

                // 4. Apply our algorithm (for now, it's still random)
                const isGenuine = Math.random() < 0.2;
                
                const tokenData = {
                    signature: signature,
                    address: mintAddress,
                    name: "Unknown Token", // We will get this in the next version
                    symbol: "TBD",
                    liquidity: Math.floor(Math.random() * 50000) + 1000,
                    solscanLink: `https://solscan.io/token/${mintAddress}`, // Link to token page now
                    txLink: `https://solscan.io/tx/${signature}`
                };

                const list = isGenuine ? pureGemsList : tradableGemsList;
                const category = isGenuine ? "💎 Pure Genuine" : "🎲 Tradable Gem";
                
                addTokenCard(tokenData, list, category);

            } catch (e) {
                console.error(`Error processing transaction ${signature}:`, e);
            }
        }

        function addTokenCard(token, listElement, category) {
            if (isFirstToken) {
                pureGemsList.innerHTML = '';
                tradableGemsList.innerHTML = '';
                isFirstToken = false;
            }

            const card = document.createElement('div');
            card.className = 'bg-gray-800 p-4 rounded-lg shadow-lg border border-gray-700 new-card-animation';
            card.innerHTML = `
                <div class="flex justify-between items-center">
                    <div class="flex items-center">
                        <div class="w-10 h-10 rounded-full bg-purple-500 flex items-center justify-center font-bold text-xl mr-3">?</div>
                        <div>
                            <h3 class="font-bold text-lg">${token.name} (${token.symbol})</h3>
                            <p class="text-sm text-gray-400 truncate w-40" title="${token.address}">${token.address}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-semibold text-green-400">$${token.liquidity.toLocaleString()}</p>
                        <p class="text-xs text-gray-500">Liquidity (Est.)</p>
                    </div>
                </div>
                <div class="mt-4 flex justify-between items-center text-sm">
                    <div class="flex space-x-4 text-gray-400">
                        <a href="#" class="hover:text-white" title="Website"><i class="fas fa-globe"></i></a>
                        <a href="#" class="hover:text-white" title="Twitter/X"><i class="fab fa-twitter"></i></a>
                        <a href="#" class="hover:text-white" title="Telegram"><i class="fab fa-telegram"></i></a>
                    </div>
                    <div>
                        <a href="${token.solscanLink}" target="_blank" class="bg-gray-700 hover:bg-purple-600 text-white font-semibold py-1 px-3 rounded-md transition-colors duration-200">
                            Token <i class="fas fa-external-link-alt ml-1"></i>
                        </a>
                         <a href="${token.txLink}" target="_blank" class="bg-gray-700 hover:bg-purple-600 text-white font-semibold py-1 px-3 rounded-md transition-colors duration-200">
                            TX <i class="fas fa-external-link-alt ml-1"></i>
                        </a>
                    </div>
                </div>
            `;
            listElement.prepend(card);
        }

        function updateStatus(text, statusClass) {
            statusText.textContent = text;
            statusIndicator.className = `status-dot status-${statusClass}`;
        }

        // --- START THE APP ---
        main();
    </script>
</body>
</html>
