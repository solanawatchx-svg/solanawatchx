apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ingestion-service
  template:
    metadata:
      labels:
        app: ingestion-service
    spec:
      containers:
        - name: ingestion
          image: solanawatchx/ingestion:latest
          env:
            - name: RPC_WSS_ENDPOINT
              value: "wss://mainnet.helius-rpc.com/?api-key=YOUR_KEY"
            - name: PUMPFUN_PROGRAM_ID
              value: "6EF8rrecthR5Dkzon8Nwu78hRvfCKubJ14M5uBEwF6P"
            - name: RABBITMQ_URL
              value: "amqp://guest:guest@rabbitmq:5672/"
            - name: QUEUE_NEW_TOKEN
              value: "new_token_unprocessed"
            - name: QUEUE_TRADES
              value: "pumpfun_trades"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
