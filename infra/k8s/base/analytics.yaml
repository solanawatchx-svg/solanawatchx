apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics-api
  template:
    metadata:
      labels:
        app: analytics-api
    spec:
      containers:
        - name: api
          image: solanawatchx/analytics:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://swx:swxpassword@postgres:5432/swx"
            - name: RABBITMQ_URL
              value: "amqp://guest:guest@rabbitmq:5672/"
            - name: QUEUE_NEW_TOKEN
              value: "new_token_unprocessed"
            - name: QUEUE_TRADES
              value: "pumpfun_trades"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-api
spec:
  selector:
    app: analytics-api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics-worker
  template:
    metadata:
      labels:
        app: analytics-worker
    spec:
      containers:
        - name: worker
          image: solanawatchx/analytics:latest
          command: ["python", "-m", "app.workers.consumer"]
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://swx:swxpassword@postgres:5432/swx"
            - name: RABBITMQ_URL
              value: "amqp://guest:guest@rabbitmq:5672/"
            - name: QUEUE_NEW_TOKEN
              value: "new_token_unprocessed"
            - name: QUEUE_TRADES
              value: "pumpfun_trades"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
