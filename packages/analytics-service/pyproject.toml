[project]
name = "solanawatchx-analytics"
version = "0.1.0"
description = "Analytics API and workers for SolanaWatchX"
requires-python = ">=3.11"
dependencies = [
	"fastapi~=0.111",
	"uvicorn[standard]~=0.30",
	"pydantic~=2.8",
	"aio_pika~=9.4",
	"asyncpg~=0.29",
	"sqlalchemy[asyncio]~=2.0",
	"pandas~=2.2",
	"networkx~=3.3",
	"httpx~=0.27",
	"telethon~=1.36.0"
]

[tool.uvicorn]
host = "0.0.0.0"
port = 8000
app = "app.main:app"
